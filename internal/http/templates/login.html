<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in — identity-provider</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 24rem; margin: 4rem auto; padding: 0 1rem; color: #222; }
        h1 { margin-bottom: 1.5rem; font-size: 1.25rem; }
        form { display: flex; flex-direction: column; gap: 0.75rem; }
        label { font-size: 0.875rem; color: #555; }
        input[type="email"], input[type="password"] {
            font-size: 1rem; padding: 0.5rem; border: 1px solid #bbb; border-radius: 4px;
        }
        button {
            font-size: 1rem; padding: 0.6rem; border: 0; border-radius: 4px;
            background: #2563eb; color: white; cursor: pointer; margin-top: 0.5rem;
        }
        button:hover { background: #1e40af; }
        .error {
            background: #fee; border: 1px solid #fcc; color: #900;
            padding: 0.5rem 0.75rem; border-radius: 4px; font-size: 0.875rem;
        }
        .footer { margin-top: 2rem; font-size: 0.75rem; color: #888; }
    </style>
</head>
<body>
    <h1>Log in to identity-provider</h1>
    {{- if .ErrorMessage }}
    <div class="error">{{ .ErrorMessage }}</div>
    {{- end }}
    <form method="POST" action="/login">
        {{ .CSRFField }}
        <input type="hidden" name="return_to" value="{{ .ReturnTo }}">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" autofocus value="{{ .Email }}">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <button type="submit">Log in</button>
    </form>
    <div class="footer">
        identity-provider — subproject 2 of sysdesign-lab
    </div>
</body>
</html>
